<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><meta name="format-detection" content="telephone=no,email=no,address=no"><meta name="theme-color" content="#ffffff">
  <title>иҢ„еӯҗдәӨжҳ“ - дҝ®ж”№зҷ»еҪ•еҜҶз Ғ</title>
  <style>
    :root{--title:#29344a;--secondary:#9eaab9;--page:#f2f3f5;--danger:#f53f3f;--top:92px}*,*::before,*::after{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#dfe3e8;color:var(--title)}body{display:flex;align-items:center;justify-content:center;min-height:100dvh;overflow:hidden;font-family:"MiSans VF","MiSans","PingFang SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}button,input{font:inherit}button{padding:0;border:0;outline:0;background:none;color:inherit;cursor:pointer}.stage{position:relative;width:375px;height:816px;flex:0 0 auto}.screen{position:absolute;left:0;top:0;width:375px;height:816px;overflow:hidden;transform-origin:left top;background:var(--page);box-shadow:0 0 28px rgba(34,43,57,.12)}
    .navigation{position:absolute;inset:0 0 auto;z-index:20;height:var(--top);background:#fff}.statusbar{height:44px;position:relative;color:#000;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif}.time{position:absolute;left:24px;top:12px;width:54px;text-align:center;font-size:15px;font-weight:600;line-height:20px;letter-spacing:-.5px}.system-icons{position:absolute;right:15px;top:16px;width:68px;height:14px;display:flex;align-items:center;justify-content:flex-end;gap:5px}.signal{display:flex;align-items:flex-end;gap:1.5px;height:11px}.signal i{display:block;width:2.4px;border-radius:2px;background:#111}.signal i:nth-child(1){height:4px}.signal i:nth-child(2){height:6px}.signal i:nth-child(3){height:8px}.signal i:nth-child(4){height:11px}.wifi{width:14px;height:10px;border:2px solid #111;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:50%;position:relative}.wifi::after{content:"";position:absolute;left:4px;top:4px;width:3px;height:3px;border-radius:50%;background:#111}.battery{width:23px;height:11px;border:1.3px solid #111;border-radius:2.5px;padding:1.5px;position:relative}.battery::before{content:"";display:block;width:16px;height:6px;border-radius:1px;background:#111}.battery::after{content:"";position:absolute;right:-3px;top:3px;width:1.5px;height:4px;border-radius:0 1px 1px 0;background:#111}.nav-row{height:48px;position:relative;display:flex;align-items:center;justify-content:center}.nav-title{margin:0;font-size:16px;font-weight:600;line-height:24px}.back-button{position:absolute;left:8px;top:4px;width:40px;height:40px;display:grid;place-items:center}.back-button svg{width:24px;height:24px}
    .form-scroll{position:absolute;inset:var(--top) 0 84px;overflow-y:auto;padding:12px;scrollbar-width:none}.form-scroll::-webkit-scrollbar{display:none}.form-card{padding:16px 12px 12px;border-radius:4px;background:#fff}.field{margin-bottom:20px}.field:last-child{margin-bottom:0}.label{display:block;margin:0 0 10px;font-size:14px;line-height:22px}.required{color:var(--danger)}.input-box{height:48px;display:flex;align-items:center;border-radius:4px;background:var(--page);overflow:hidden}.phone{padding:0 16px;font-size:16px}.phone i{width:1px;height:18px;margin:0 10px;background:#c9cdd4}.input-box input{min-width:0;flex:1;height:100%;padding:0 16px;border:0;outline:0;background:transparent;color:var(--title);font-size:14px}.input-box input::placeholder{color:var(--secondary)}.send-code{height:28px;flex:0 0 auto;padding:0 16px;border-left:1px solid #dfe3e8;font-size:12px}.send-code:disabled{color:var(--secondary)}.eye{width:48px;height:48px;display:grid;place-items:center;color:var(--title)}.eye svg{width:22px;height:22px}.submit-wrap{position:absolute;left:12px;right:12px;bottom:34px;padding-bottom:12px}.submit{width:100%;height:48px;border-radius:2px;background:#202125;color:#fff;font-size:14px}.submit:active{opacity:.88}.gesture{position:absolute;inset:auto 0 0;height:34px;background:var(--page)}.gesture::after{content:"";position:absolute;left:50%;bottom:8px;width:134px;height:5px;transform:translateX(-50%);border-radius:100px;background:rgba(0,0,0,.95)}.toast{position:absolute;left:50%;bottom:100px;z-index:50;max-width:320px;padding:9px 14px;transform:translate(-50%,10px);border-radius:6px;background:rgba(27,34,43,.92);color:#fff;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
</head>
<body><div class="stage" id="stage"><main class="screen" id="prototypeScreen" aria-label="дҝ®ж”№зҷ»еҪ•еҜҶз Ғ">
  <header class="navigation"><div class="statusbar" aria-hidden="true"><span class="time">9:41</span><div class="system-icons"><span class="signal"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="battery"></span></div></div><div class="nav-row"><button class="back-button" id="backButton" aria-label="иҝ”еӣһ"><svg viewBox="0 0 24 24" fill="none"><path d="m15 5-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><h1 class="nav-title">дҝ®ж”№зҷ»еҪ•еҜҶз Ғ</h1></div></header>
  <form class="form-scroll" id="passwordForm" novalidate><section class="form-card">
    <div class="field"><label class="label">жүӢжңәеҸ· <span class="required">*</span></label><div class="input-box phone"><span>+86</span><i></i><span>159****4761</span></div></div>
    <div class="field"><label class="label" for="verifyCode">йӘҢиҜҒз Ғ <span class="required">*</span></label><div class="input-box"><input id="verifyCode" maxlength="6" inputmode="numeric" autocomplete="one-time-code" placeholder="иҜ·иҫ“е…ҘйӘҢиҜҒз Ғ"><button class="send-code" id="sendCode" type="button">еҸ‘йҖҒйӘҢиҜҒз Ғ</button></div></div>
    <div class="field"><label class="label" for="password">зҷ»еҪ•еҜҶз Ғ <span class="required">*</span></label><div class="input-box"><input id="password" type="password" maxlength="20" autocomplete="new-password" placeholder="иҜ·иҫ“е…Ҙзҷ»еҪ•еҜҶз Ғ"><button class="eye" type="button" data-eye="password" aria-label="жҳҫзӨәзҷ»еҪ•еҜҶз Ғ"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12s3.5-5 9-5 9 5 9 5-3.5 5-9 5-9-5-9-5Z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg></button></div></div>
    <div class="field"><label class="label" for="confirmPassword">зЎ®и®Өзҷ»еҪ•еҜҶз Ғ <span class="required">*</span></label><div class="input-box"><input id="confirmPassword" type="password" maxlength="20" autocomplete="new-password" placeholder="иҜ·иҫ“е…ҘзЎ®и®Өзҷ»еҪ•еҜҶз Ғ"><button class="eye" type="button" data-eye="confirmPassword" aria-label="жҳҫзӨәзЎ®и®Өзҷ»еҪ•еҜҶз Ғ"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12s3.5-5 9-5 9 5 9 5-3.5 5-9 5-9-5-9-5Z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg></button></div></div>
  </section></form>
  <div class="submit-wrap"><button class="submit" id="submitButton" type="button">зЎ®и®ӨжҸҗдәӨ</button></div><div class="gesture" aria-hidden="true"></div><div class="toast" id="toast" role="status"></div>
</main></div>
<script>(()=>{const stage=document.getElementById('stage');const screen=document.getElementById('prototypeScreen');const toast=document.getElementById('toast');let toastTimer;let countdownTimer;const fitScreen=()=>{const scale=Math.min(1,innerWidth/375,innerHeight/816);stage.style.width=`${375*scale}px`;stage.style.height=`${816*scale}px`;screen.style.transform=`scale(${scale})`};const notify=text=>{toast.textContent=text;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1800)};addEventListener('resize',fitScreen);fitScreen();document.getElementById('backButton').addEventListener('click',()=>location.href='my.html');document.querySelectorAll('[data-eye]').forEach(button=>button.addEventListener('click',()=>{const input=document.getElementById(button.dataset.eye);const visible=input.type==='text';input.type=visible?'password':'text';button.setAttribute('aria-label',visible?'жҳҫзӨәеҜҶз Ғ':'йҡҗи—ҸеҜҶз Ғ');button.style.opacity=visible?'1':'.55'}));document.getElementById('sendCode').addEventListener('click',event=>{const button=event.currentTarget;let seconds=60;button.disabled=true;button.textContent=`${seconds}sеҗҺйҮҚеҸ‘`;notify('йӘҢиҜҒз Ғе·ІеҸ‘йҖҒиҮі 159****4761');clearInterval(countdownTimer);countdownTimer=setInterval(()=>{seconds-=1;if(seconds<=0){clearInterval(countdownTimer);button.disabled=false;button.textContent='йҮҚж–°еҸ‘йҖҒ'}else button.textContent=`${seconds}sеҗҺйҮҚеҸ‘`},1000)});document.getElementById('submitButton').addEventListener('click',()=>{const code=document.getElementById('verifyCode').value.trim();const password=document.getElementById('password').value;const confirmation=document.getElementById('confirmPassword').value;if(!/^\d{4,6}$/.test(code)){notify('иҜ·иҫ“е…ҘжӯЈзЎ®зҡ„йӘҢиҜҒз Ғ');return}if(password.length<6){notify('зҷ»еҪ•еҜҶз ҒиҮіе°‘йңҖиҰҒ 6 дҪҚ');return}if(password!==confirmation){notify('дёӨж¬Ўиҫ“е…Ҙзҡ„зҷ»еҪ•еҜҶз ҒдёҚдёҖиҮҙ');return}notify('зҷ»еҪ•еҜҶз Ғдҝ®ж”№жҲҗеҠҹ');setTimeout(()=>location.href='my.html',900)});addEventListener('keydown',event=>{if(event.key==='Escape')document.getElementById('backButton').click()})})();</script>
</body></html>
