    function save(){sessionStorage.setItem('qzPublishDraftV2',JSON.stringify(draft))}
    function fields(){return [...current.fields]}
    function complete(field){if(field.auto)return true;if(field.optional&&draft[`${field.key}Skipped`])return true;if(['number','text','textarea'].includes(field.type))return draft[`${field.key}Confirmed`]===true;if(field.type==='tags')return draft[`${field.key}Confirmed`]===true;if(field.type==='upload')return draft[`${field.key}Confirmed`]===true;const value=draft[field.key];return value!==undefined&&String(value).trim()!==''}
    function notify(message){toast.textContent=message;toast.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>toast.classList.remove('show'),1600)}
    function optionInfo(option){return Array.isArray(option)?{value:option[0],label:option[1]}:{value:option,label:option}}
    function optionMarkup(field){return `<div class="option-grid">${field.options.map(option=>{const item=optionInfo(option);return `<button class="flow-option ${draft[field.key]===item.value?'active':''}" data-pick="${field.key}" data-value="${item.value}">${item.label}</button>`}).join('')}</div>`}
    function inputMarkup(field){const textarea=field.type==='textarea',value=String(draft[field.key]||''),confirm=`<button class="input-confirm" data-confirm-input="${field.key}" ${value.trim()?'':'disabled'}>确定</button>`;return `<div class="input-line">${textarea?`<textarea class="flow-input flow-textarea" data-input="${field.key}" data-type="text" maxlength="200" placeholder="${field.placeholder}">${value}</textarea>`:`<input class="flow-input" data-input="${field.key}" data-type="${field.type}" maxlength="${field.type==='text'?80:20}" inputmode="${field.type==='number'?'decimal':'text'}" value="${value}" placeholder="${field.placeholder||'请输入'}">`}${field.unit?`<span class="input-unit">${field.unit}</span>`:''}</div>${field.note?`<p class="field-note">${field.note}</p>`:''}${field.optional?`<div class="optional-input-actions"><button class="skip-field" data-skip="${field.key}">跳过</button>${confirm}</div>`:confirm}`}
    function selectMarkup(field){return `<select class="flow-input flow-select" data-select="${field.key}"><option value="">请选择常用登录城市</option>${field.options.map(option=>`<option value="${option}" ${draft[field.key]===option?'selected':''}>${option}</option>`).join('')}</select><button class="skip-field" data-skip="${field.key}">暂不填写</button>`}
    function tagsMarkup(field){const values=Array.isArray(draft[field.key])?draft[field.key]:[];return `<div class="tag-entry"><input class="flow-input" data-tag-input="${field.key}" placeholder="${field.placeholder}"><button class="add-tag" data-add-tag="${field.key}">添加</button></div>${values.length?`<div class="tag-list">${values.map(name=>`<span>${name}</span>`).join('')}</div>`:''}<div class="field-actions">${values.length?`<button class="chip-confirm" data-confirm-tags="${field.key}">确认资产</button>`:''}<button class="skip-field" data-skip="${field.key}">无此资产，跳过</button></div>`}
    function uploadMarkup(field){const files=uploadFiles[field.key]||[];return `<div class="upload-grid">${files.map(src=>`<span class="flow-upload"><img src="${src}" alt="上传图片"></span>`).join('')}<label class="flow-upload">${files.length?'继续上传':'＋<br>上传图片'}<input data-file="${field.key}" type="file" accept="image/*" multiple hidden></label></div><button class="skip-upload" data-confirm-upload="${field.key}">${files.length?'确认上传':'暂不上传'}</button>`}
    function estimateMarkup(){const coins=Number(draft.hafuCoin)||0,level=Number(draft.trainingCenter)||1,ratio=Math.max(28,28+level*1.5+(draft.safeBox==='3×3'?2:0));draft.standardRatio=ratio.toFixed(1);draft.quickRatio=(ratio*.91).toFixed(1);save();return `<div class="estimate"><div><span>标准比例</span><b>${draft.standardRatio}</b></div><div><span>快出比例</span><b>${draft.quickRatio}</b></div></div><p class="field-note">参考纯币 ${coins||0}M、训练中心和安全箱综合估算。</p>`}
    function displayValue(field){if(field.optional&&draft[`${field.key}Skipped`])return '已跳过';if(field.type==='tags')return (draft[field.key]||[]).join('、');if(field.type==='upload')return draft[`${field.key}Confirmed`]?(uploadFiles[field.key]?.length?`已上传${uploadFiles[field.key].length}张`:'已跳过'):'';if(field.type==='estimate')return '已估价';const raw=draft[field.key];if(raw===undefined)return '';if(field.type==='options'){const match=field.options.map(optionInfo).find(item=>item.value===raw);return match?.label||raw}return raw}
    function fieldMarkup(field){let content='';if(field.type==='options')content=optionMarkup(field);else if(['number','text','textarea'].includes(field.type))content=inputMarkup(field);else if(field.type==='select')content=selectMarkup(field);else if(field.type==='tags')content=tagsMarkup(field);else if(field.type==='upload')content=uploadMarkup(field);else if(field.type==='estimate')content=estimateMarkup();const value=displayValue(field),titleClass=field.optional||field.auto?'field-title':'field-title required',expanded=expandedKeys.has(field.key),inputType=['number','text','textarea'].includes(field.type);return `<section class="flow-card" data-card="${field.key}"><button class="field-head" data-toggle-field="${field.key}" aria-expanded="${expanded}"><span class="${titleClass}">${field.label}</span><span class="field-side">${value?`<span class="field-value">${value}</span>`:''}<i class="field-chevron ${expanded?'up':''}"></i></span></button>${expanded?`<div class="field-content">${!inputType&&field.note?`<p class="field-note">${field.note}</p>`:''}${content}</div>`:''}</section>`}
    function extraIcon(type){const shapes={crate:'<path fill="#29312e" d="M9 15h46v31H9z"/><path fill="#66706b" d="M17 11h30l5 7H12z"/><path fill="none" stroke="#a7ada9" stroke-width="2" d="M16 22h32v17H16zM23 14v-4h18v4"/>',helmet:'<path fill="#897b62" d="M8 34C9 17 20 8 32 8s23 9 24 26l-7 3H15z"/><path fill="#34383b" d="M13 35h40v8H13zM43 40h10v10H43z"/><path fill="none" stroke="#c9bea9" stroke-width="2" d="M17 31c2-11 8-16 15-16"/>',armor:'<path fill="#555844" d="m19 8 8 5h10l8-5 10 9-7 38H16L9 17z"/><path fill="#292d29" d="M22 14h20l4 34H18z"/><path fill="none" stroke="#777b5f" stroke-width="3" d="M24 25h16M22 35h20"/>',red:'<path fill="#a34c4a" d="M14 10h34v46H14z"/><path fill="#d27a72" d="m14 10 8-5h34l-8 5z"/><path fill="#753839" d="m48 10 8-5v45l-8 6z"/><path fill="#ead5c8" d="M19 17h23v9H19z"/>',card:'<rect x="8" y="14" width="48" height="34" rx="5" fill="#202d2e"/><path fill="#23a77a" d="M15 21h34v20H15z"/><path fill="#a5f1d5" d="M19 25h8v5h-8zm10 0h8v5h-8zm10 0h7v5h-7zM19 32h8v5h-8zm10 0h8v5h-8zm10 0h7v5h-7z"/>',rifle:'<path fill="#20252b" d="M5 31h30l8-6 13 2v5l-11 2-5 5H29l-4-4H5z"/><path fill="#3d4650" d="M10 27h25v4H10zm25-5h12v4H35z"/>'};return `<svg viewBox="0 0 64 64" aria-hidden="true">${shapes[type]}</svg>`}
    function extraItemValue(item){const saved=draft.extraChargeValues?.[item.key]||{};return {quantity:Number(saved.quantity)||0,price:saved.price===undefined?item.price:Number(saved.price)||0}}
    function setExtraItemValue(key,field,value){const item=extraChargeItems.find(entry=>entry.key===key),current=extraItemValue(item),number=Math.max(0,Number(value)||0);draft.extraChargeValues={...(draft.extraChargeValues||{}),[key]:{...current,[field]:number}};save()}
    function extraSettingsMarkup(){const mode=draft.extraChargeMode||'paid',modeLabel=mode==='paid'?'需要计费':'无需计费';return `<section class="flow-card extra-settings"><button class="field-head" data-toggle-extra-settings aria-expanded="${extraSettingsExpanded}"><span class="field-title">额外道具付费设置</span><span class="field-side"><span class="field-value">${modeLabel}</span><i class="field-chevron ${extraSettingsExpanded?'up':''}"></i></span></button>${extraSettingsExpanded?`<div class="field-content"><div class="extra-charge-options"><button class="extra-charge-option ${mode==='paid'?'active':''}" data-charge-mode="paid">需要计费</button><button class="extra-charge-option ${mode==='free'?'active':''}" data-charge-mode="free">无需计费</button></div>${mode==='paid'?`<div class="extra-item-list">${extraChargeItems.map(item=>{const value=extraItemValue(item);return `<div class="extra-item-row"><div class="extra-item-thumb">${extraIcon(item.icon)}</div><div class="extra-item-main"><div class="extra-item-name">${item.name}</div><div class="extra-item-controls"><label><span class="extra-control-label">数量（${item.unit}）</span><span class="extra-stepper"><button data-extra-adjust="${item.key}" data-extra-field="quantity" data-extra-delta="-1">−</button><input data-extra-value="${item.key}" data-extra-field="quantity" inputmode="numeric" value="${value.quantity}"><button data-extra-adjust="${item.key}" data-extra-field="quantity" data-extra-delta="1">＋</button></span></label><label><span class="extra-control-label">单价（元/${item.unit}）</span><span class="extra-stepper"><button data-extra-adjust="${item.key}" data-extra-field="price" data-extra-delta="-0.5">−</button><input data-extra-value="${item.key}" data-extra-field="price" inputmode="decimal" value="${value.price}"><button data-extra-adjust="${item.key}" data-extra-field="price" data-extra-delta="0.5">＋</button></span></label></div></div></div>`}).join('')}</div><p class="extra-settings-note">包含六头、六甲、红弹、AWM子弹、3×3体验卡、巴雷特子弹等道具的收费设定。最终根据结算时的实际道具消耗统计道具费用。</p>`:'<p class="extra-free-note">选择无需计费后，租客使用这些额外道具时不再单独收取费用。</p>'}</div>`:''}</section>`}
    function updateProgress(allFields){let count=0;for(const field of allFields){if(!complete(field))break;count++}const total=allFields.length;document.getElementById('progressText').textContent=`${count}/${total}`;document.getElementById('progressFill').style.width=`${Math.max(11,count/total*100)}%`;next.disabled=count<total||(step===4&&!draft.agreed);next.textContent=step===4?'确认并发布':'下一步'}
    function render(scrollNew=false){const allFields=fields(),firstIncomplete=allFields.findIndex(field=>!complete(field)),visibleTo=firstIncomplete===-1?allFields.length-1:firstIncomplete;if(firstIncomplete!==-1)expandedKeys.add(allFields[firstIncomplete].key);list.innerHTML=`${current.staticInfo?`<div class="flow-static"><span>${current.staticInfo[0]}</span><b>${current.staticInfo[1]}</b></div>`:''}${allFields.slice(0,visibleTo+1).map(fieldMarkup).join('')}${step===2&&firstIncomplete===-1?extraSettingsMarkup():''}`;document.getElementById('stepTitle').textContent=current.title;document.getElementById('flowFooter').classList.toggle('has-previous',step>1);agreeToggle.classList.toggle('checked',draft.agreed);updateProgress(allFields);bindControls();if(scrollNew)setTimeout(()=>body.scrollTo({top:body.scrollHeight,behavior:'smooth'}),30)}
    function bindControls(){document.querySelectorAll('[data-input]').forEach(input=>{input.addEventListener('input',()=>{let value=input.value;if(input.dataset.type==='number'){value=value.replace(/[^\d.]/g,'').replace(/(\..*)\./g,'$1');input.value=value}draft[input.dataset.input]=value;draft[`${input.dataset.input}Skipped`]=false;save();const confirm=document.querySelector(`[data-confirm-input="${input.dataset.input}"]`);if(confirm)confirm.disabled=!value.trim()});input.addEventListener('keydown',event=>{if(event.key==='Enter'&&input.tagName!=='TEXTAREA'){event.preventDefault();document.querySelector(`[data-confirm-input="${input.dataset.input}"]`)?.click()}})});document.querySelectorAll('[data-select]').forEach(select=>select.addEventListener('change',()=>{if(!select.value)return;draft[select.dataset.select]=select.value;draft[`${select.dataset.select}Skipped`]=false;expandedKeys.delete(select.dataset.select);save();render(true)}));document.querySelectorAll('[data-file]').forEach(input=>input.addEventListener('change',event=>{const key=input.dataset.file,files=uploadFiles[key]||[];[...event.target.files].slice(0,9-files.length).forEach(file=>{const reader=new FileReader();reader.onload=()=>{uploadFiles[key]=[...(uploadFiles[key]||[]),reader.result];render()};reader.readAsDataURL(file)})}));document.querySelectorAll('[data-extra-value]').forEach(input=>input.addEventListener('input',()=>setExtraItemValue(input.dataset.extraValue,input.dataset.extraField,input.value)))}
    list.addEventListener('click',event=>{if(event.target.closest('[data-toggle-extra-settings]')){extraSettingsExpanded=!extraSettingsExpanded;render();return}const chargeMode=event.target.closest('[data-charge-mode]');if(chargeMode){draft.extraChargeMode=chargeMode.dataset.chargeMode;save();render();return}const adjust=event.target.closest('[data-extra-adjust]');if(adjust){const item=extraChargeItems.find(entry=>entry.key===adjust.dataset.extraAdjust),current=extraItemValue(item),field=adjust.dataset.extraField;setExtraItemValue(item.key,field,current[field]+Number(adjust.dataset.extraDelta));render();return}const toggle=event.target.closest('[data-toggle-field]');if(toggle){const key=toggle.dataset.toggleField;expandedKeys.has(key)?expandedKeys.delete(key):expandedKeys.add(key);render();return}const confirmInput=event.target.closest('[data-confirm-input]');if(confirmInput){const key=confirmInput.dataset.confirmInput;if(!String(draft[key]||'').trim()){notify('请先填写内容');return}draft[`${key}Confirmed`]=true;expandedKeys.delete(key);save();render(true);return}const pick=event.target.closest('[data-pick]');if(pick){draft[pick.dataset.pick]=pick.dataset.value;expandedKeys.delete(pick.dataset.pick);save();render(true);return}const skip=event.target.closest('[data-skip]');if(skip){draft[`${skip.dataset.skip}Skipped`]=true;expandedKeys.delete(skip.dataset.skip);save();render(true);return}const addTag=event.target.closest('[data-add-tag]');if(addTag){const key=addTag.dataset.addTag,input=document.querySelector(`[data-tag-input="${key}"]`),name=input.value.trim();if(!name)return;draft[key]=[...new Set([...(draft[key]||[]),name])];draft[`${key}Skipped`]=false;save();render();return}const confirmTags=event.target.closest('[data-confirm-tags]');if(confirmTags){draft[`${confirmTags.dataset.confirmTags}Confirmed`]=true;expandedKeys.delete(confirmTags.dataset.confirmTags);save();render(true);return}const upload=event.target.closest('[data-confirm-upload]');if(upload){draft[`${upload.dataset.confirmUpload}Confirmed`]=true;draft[`${upload.dataset.confirmUpload}Skipped`]=!(uploadFiles[upload.dataset.confirmUpload]||[]).length;expandedKeys.delete(upload.dataset.confirmUpload);save();render(true);return}});
    next.addEventListener('click',()=>{if(next.disabled)return;if(step<4){location.href=`publish.html?step=${step+1}`}else{notify('提交成功，商品进入待审核');sessionStorage.removeItem('qzPublishDraftV2');setTimeout(()=>location.href='sell.html?state=wait',900)}});
    document.getElementById('previous').onclick=()=>{if(step>1)location.href=`publish.html?step=${step-1}`};agreeToggle.onclick=()=>{draft.agreed=!draft.agreed;save();render()};document.getElementById('back').onclick=()=>{location.href=step>1?`publish.html?step=${step-1}`:'sell.html'};document.getElementById('agreement').onclick=()=>location.href='agreement.html';render();
  </script>
</body>
