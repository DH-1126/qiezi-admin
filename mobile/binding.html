<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#fff"><title>茄子交易 - 第三方授权绑定</title><style>
:root{--title:#29344a;--secondary:#9eaab9;--page:#f2f3f5;--green:#43b581;--top:92px}*,*::before,*::after{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#dfe3e8;color:var(--title)}body{display:flex;align-items:center;justify-content:center;min-height:100dvh;overflow:hidden;font-family:"MiSans VF","MiSans","PingFang SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}button{padding:0;border:0;outline:0;background:none;color:inherit;font:inherit;cursor:pointer}.stage{position:relative;width:375px;height:816px}.screen{position:absolute;left:0;top:0;width:375px;height:816px;overflow:hidden;transform-origin:left top;background:var(--page);box-shadow:0 0 28px rgba(34,43,57,.12)}.navigation{position:absolute;inset:0 0 auto;z-index:20;height:var(--top);background:#fff}.statusbar{height:44px;position:relative;color:#000;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif}.time{position:absolute;left:24px;top:12px;width:54px;text-align:center;font-size:15px;font-weight:600;line-height:20px}.system-icons{position:absolute;right:15px;top:16px;width:68px;height:14px;display:flex;justify-content:flex-end;align-items:center;gap:5px}.signal{display:flex;align-items:flex-end;gap:1.5px;height:11px}.signal i{display:block;width:2.4px;border-radius:2px;background:#111}.signal i:nth-child(1){height:4px}.signal i:nth-child(2){height:6px}.signal i:nth-child(3){height:8px}.signal i:nth-child(4){height:11px}.wifi{width:14px;height:10px;border:2px solid #111;border-left-color:transparent;border-right-color:transparent;border-bottom-color:transparent;border-radius:50%;position:relative}.wifi::after{content:"";position:absolute;left:4px;top:4px;width:3px;height:3px;border-radius:50%;background:#111}.battery{width:23px;height:11px;border:1.3px solid #111;border-radius:2.5px;padding:1.5px;position:relative}.battery::before{content:"";display:block;width:16px;height:6px;border-radius:1px;background:#111}.battery::after{content:"";position:absolute;right:-3px;top:3px;width:1.5px;height:4px;background:#111}.nav-row{height:48px;position:relative;display:flex;align-items:center;justify-content:center}.nav-title{margin:0;font-size:16px;font-weight:600}.back-button{position:absolute;left:8px;top:4px;width:40px;height:40px;display:grid;place-items:center}.back-button svg{width:24px;height:24px}.content{position:absolute;inset:var(--top) 0 34px;padding:12px}.binding-card{width:100%;height:72px;display:flex;align-items:center;padding:0 16px;border-radius:4px;background:#fff;text-align:left}.wechat{width:40px;height:40px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;background:var(--green);color:#fff}.wechat svg{width:27px;height:27px}.binding-copy{min-width:0;flex:1;margin-left:12px}.binding-title{display:block;font-size:15px;line-height:22px}.binding-desc{display:block;margin-top:2px;color:var(--secondary);font-size:11px;line-height:18px;white-space:nowrap}.binding-status{margin-left:8px;color:var(--green);font-size:12px}.gesture{position:absolute;inset:auto 0 0;height:34px;background:var(--page)}.gesture::after{content:"";position:absolute;left:50%;bottom:8px;width:134px;height:5px;transform:translateX(-50%);border-radius:9px;background:#000}.overlay{position:absolute;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(20,26,34,.56)}.overlay.show{display:flex}.sheet{width:100%;padding:8px 16px 24px;border-radius:12px 12px 0 0;background:#fff;animation:up .18s ease-out}@keyframes up{from{transform:translateY(24px);opacity:.5}}.handle{width:35px;height:4px;margin:0 auto 16px;border-radius:2px;background:#e5e6eb}.sheet h2{margin:0;text-align:center;font-size:16px}.sheet p{margin:8px 8px 18px;color:var(--secondary);font-size:12px;line-height:20px;text-align:center}.actions{display:flex;gap:12px}.actions button{height:42px;flex:1;border-radius:4px;font-size:14px;font-weight:600}.cancel{border:1px solid #e5e9f2}.confirm{background:#202125;color:#fff}.toast{position:absolute;left:50%;bottom:56px;z-index:60;padding:9px 14px;transform:translate(-50%,10px);border-radius:6px;background:rgba(27,34,43,.92);color:#fff;font-size:12px;white-space:nowrap;opacity:0;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
</style></head><body><div class="stage" id="stage"><main class="screen" id="prototypeScreen" aria-label="第三方授权绑定"><header class="navigation"><div class="statusbar" aria-hidden="true"><span class="time">9:41</span><div class="system-icons"><span class="signal"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="battery"></span></div></div><div class="nav-row"><button class="back-button" id="backButton" aria-label="返回"><svg viewBox="0 0 24 24" fill="none"><path d="m15 5-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><h1 class="nav-title">第三方授权绑定</h1></div></header><section class="content"><button class="binding-card" id="bindingButton"><span class="wechat"><svg viewBox="0 0 32 32" fill="currentColor"><path d="M12.8 6C6.8 6 2 9.8 2 14.5c0 2.7 1.6 5.1 4.1 6.7L5 24.4l3.8-1.8c1.3.4 2.6.6 4 .6h.7c-.4-.9-.6-1.8-.6-2.8 0-4.4 4.4-8 9.8-8h.6C22.1 8.7 18 6 12.8 6Zm-3.6 6.2a1.3 1.3 0 1 1 0-2.6 1.3 1.3 0 0 1 0 2.6Zm7.2 0a1.3 1.3 0 1 1 0-2.6 1.3 1.3 0 0 1 0 2.6Z"/><path d="M30 20.5c0-3.8-3.7-6.9-8.3-6.9s-8.3 3.1-8.3 6.9 3.7 6.9 8.3 6.9c1.1 0 2.1-.2 3.1-.5l3 1.5-.8-2.6c1.8-1.3 3-3.2 3-5.3Zm-11-1.7a1.1 1.1 0 1 1 0-2.2 1.1 1.1 0 0 1 0 2.2Zm5.6 0a1.1 1.1 0 1 1 0-2.2 1.1 1.1 0 0 1 0 2.2Z"/></svg></span><span class="binding-copy"><span class="binding-title">微信公众号关注绑定</span><span class="binding-desc">通过微信获得验证码，订单交易等相关推送</span></span><span class="binding-status" id="bindingStatus">未绑定</span></button></section><div class="gesture" aria-hidden="true"></div><div class="overlay" id="bindingOverlay" role="dialog" aria-modal="true"><section class="sheet"><div class="handle"></div><h2 id="sheetTitle">绑定微信公众号</h2><p id="sheetDesc">模拟跳转至微信完成关注授权，绑定后可接收验证码和订单状态提醒。</p><div class="actions"><button class="cancel" id="cancelButton">取消</button><button class="confirm" id="confirmButton">去绑定</button></div></section></div><div class="toast" id="toast"></div></main></div><script>(()=>{const stage=document.getElementById('stage'),screen=document.getElementById('prototypeScreen'),overlay=document.getElementById('bindingOverlay'),status=document.getElementById('bindingStatus'),title=document.getElementById('sheetTitle'),desc=document.getElementById('sheetDesc'),confirm=document.getElementById('confirmButton'),toast=document.getElementById('toast');let bound=false,timer;const fit=()=>{const scale=Math.min(1,innerWidth/375,innerHeight/816);stage.style.width=`${375*scale}px`;stage.style.height=`${816*scale}px`;screen.style.transform=`scale(${scale})`};const notify=text=>{toast.textContent=text;toast.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>toast.classList.remove('show'),1600)};addEventListener('resize',fit);fit();document.getElementById('backButton').onclick=()=>location.href='my.html';document.getElementById('bindingButton').onclick=()=>{title.textContent=bound?'解除微信公众号绑定':'绑定微信公众号';desc.textContent=bound?'解除后将无法通过微信接收验证码和订单状态提醒。':'模拟跳转至微信完成关注授权，绑定后可接收验证码和订单状态提醒。';confirm.textContent=bound?'确认解绑':'去绑定';overlay.classList.add('show')};document.getElementById('cancelButton').onclick=()=>overlay.classList.remove('show');overlay.onclick=e=>{if(e.target===overlay)overlay.classList.remove('show')};confirm.onclick=()=>{bound=!bound;status.textContent=bound?'已绑定':'未绑定';overlay.classList.remove('show');notify(bound?'微信公众号绑定成功':'已解除微信公众号绑定')};addEventListener('keydown',e=>{if(e.key==='Escape'){if(overlay.classList.contains('show'))overlay.classList.remove('show');else document.getElementById('backButton').click()}})})();</script></body></html>
