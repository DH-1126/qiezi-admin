<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>出哈夫币｜茄子交易</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow:hidden;background:#dfe3e8}body{display:flex;align-items:center;justify-content:center;min-height:100dvh;color:#29344a;font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}.stage{position:relative;width:375px;height:816px;flex:0 0 auto}.phone{position:absolute;left:0;top:0;width:375px;height:816px;transform-origin:left top;overflow:hidden;background:#f2f3f5;box-shadow:0 0 28px rgba(34,43,57,.12)}button,input{font:inherit}.status{height:44px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:8px 22px 0 24px;font-size:12px;font-weight:600;color:#111}.signals{display:flex;gap:5px;align-items:center}.signal{display:flex;gap:1px;align-items:end;height:11px}.signal i{display:block;width:2px;background:#111;border-radius:2px}.signal i:nth-child(1){height:4px}.signal i:nth-child(2){height:6px}.signal i:nth-child(3){height:8px}.signal i:nth-child(4){height:10px}.wifi{width:13px;height:9px;border:2px solid #111;border-left-color:transparent;border-right-color:transparent;border-bottom:0;border-radius:50%}.battery{width:18px;height:9px;border:1.5px solid #111;border-radius:2px;padding:1px}.battery:after{content:"";display:block;width:11px;height:4px;background:#111;border-radius:1px}.head{height:48px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px}.head h1{margin:0;font-size:20px;line-height:30px;font-weight:600}.icon-btn{width:34px;height:34px;border:0;background:transparent;color:#29344a;display:grid;place-items:center;border-radius:50%}.icon-btn:active{background:#f2f3f5}.icon-btn svg{width:23px;height:23px}.search-wrap{height:52px;background:#fff;padding:8px 12px}.search{height:36px;border-radius:4px;background:#f2f3f5;display:flex;align-items:center;padding:0 9px;gap:5px}.search svg{width:17px;height:17px;color:#9eaab9;flex:none}.search input{border:0;outline:0;background:transparent;width:100%;height:100%;font-size:14px;color:#29344a}.search input::placeholder{color:#9eaab9}.tabs{height:44px;background:#fff;display:flex;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab-filter{height:44px;min-width:75px;padding:0 12px;border:0;background:transparent;color:#9eaab9;font-size:14px;position:relative;white-space:nowrap}.tab-filter.active{font-size:16px;color:#29344a;font-weight:600}.tab-filter.active:after{content:"";position:absolute;left:16px;right:16px;bottom:0;height:2px;background:#29344a}.list{position:absolute;left:0;right:0;top:188px;bottom:156px;overflow:auto;padding:8px 12px 16px;overscroll-behavior:contain}.card{background:#fff;border-radius:4px;margin-bottom:8px;overflow:hidden}.meta{height:38px;padding:0 12px;display:flex;align-items:center;border-bottom:.5px solid #f2f3f5;font-size:10px;color:#9eaab9;gap:5px;white-space:nowrap}.meta>span:first-child{max-width:121px;overflow:hidden;text-overflow:ellipsis}.copy{border:0;background:transparent;color:#29344a;font-size:10px;font-weight:600;padding:5px 0;flex:none}.time{margin-left:5px;flex:none}.state{margin-left:auto;height:22px;line-height:22px;padding:0 8px;border-radius:2px;background:#f2f3f5;color:#64687a;white-space:nowrap;flex:none}.state.up{background:#e8fff0;color:#23b26d}.state.wait{background:#fff4df;color:#f59a23}.state.fail{background:#ffece8;color:#f53f3f}.product{display:flex;gap:8px;padding:8px 12px;border-bottom:.5px solid #f2f3f5}.thumb{width:72px;height:72px;flex:none;border-radius:4px;overflow:hidden;background:linear-gradient(145deg,#0a151a,#0e8b78)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.info{min-width:0;flex:1}.title{height:44px;overflow:hidden;font-size:14px;line-height:22px;font-weight:500}.desc{margin-top:8px;color:#9eaab9;font-size:12px;line-height:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bottom-row{height:44px;padding:0 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#9eaab9}.price{color:#f53f3f;font-weight:600}.divider{width:1px;height:16px;background:#e5e9f2}.action{margin-left:auto;height:28px;min-width:64px;border:1px solid #202125;border-radius:2px;background:#fff;color:#202125;font-size:14px}.empty{height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;color:#64687a;font-size:14px}.empty.show{display:flex}.empty-visual{position:relative;width:112px;height:94px;margin-bottom:15px}.empty-card{position:absolute;width:56px;height:74px;border:2px solid #dfe4ec;border-radius:6px;background:#eef1f6;transform:rotate(-14deg);left:21px;top:8px}.empty-card:nth-child(2){transform:rotate(12deg);left:55px;top:18px;background:#dfe4ec}.empty-card:after{content:"♥";position:absolute;left:18px;top:20px;color:#d9dee7;font-size:22px}.empty-card:nth-child(2):after{color:#fff}.cta-zone{position:absolute;left:0;right:0;bottom:84px;height:72px;background:#fff;padding:12px 16px}.cta{width:100%;height:48px;border:0;border-radius:2px;background:#202125;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px}.cta svg{width:20px;height:20px}.nav{position:absolute;left:0;right:0;bottom:0;height:84px;background:#fff;border-top:.5px solid #edf0f4;display:flex;padding-bottom:22px}.nav button{width:25%;border:0;background:transparent;color:#9eaab9;font-size:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}.nav button.active{color:#29344a;font-weight:600}.nav svg{width:26px;height:26px}.home-indicator{position:absolute;bottom:7px;left:50%;width:134px;height:5px;transform:translateX(-50%);border-radius:4px;background:#111;z-index:5}.toast{position:absolute;left:50%;bottom:174px;transform:translate(-50%,10px);max-width:300px;padding:9px 14px;border-radius:4px;background:rgba(32,33,37,.92);color:#fff;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:20;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
  </style>
  <link rel="stylesheet" crossorigin href="/qiezi-admin/mobile/assets/mobile-system-bar-DK3JC0tD.css">
</head>
<body>
  <main class="stage" id="stage"><section class="phone">
    <div class="status"><span>9:41</span><span class="signals"><span class="signal"><i></i><i></i><i></i><i></i></span><span class="wifi"></span><span class="battery"></span></span></div>
    <header class="head"><h1>出哈夫币</h1><button class="icon-btn" id="service" aria-label="联系客服"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><path d="M4 13h3v6H5a1 1 0 0 1-1-1v-5Zm16 0h-3v6h2a1 1 0 0 0 1-1v-5Z"/><path d="M17 19c0 1.1-1.8 2-4 2"/></svg></button></header>
    <div class="search-wrap"><label class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><input id="search" placeholder="搜索在租资产号" autocomplete="off"></label></div>
    <nav class="tabs" id="tabs" aria-label="发布状态"><button class="tab-filter active" data-state="all">全部</button><button class="tab-filter" data-state="wait">待审核</button><button class="tab-filter" data-state="up">已上架</button><button class="tab-filter" data-state="down">已下架</button><button class="tab-filter" data-state="delivery">待发货</button></nav>
    <div class="list" id="list"></div>
    <div class="cta-zone"><button class="cta" id="publish"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v5H4V4Zm1 7h14v9H5v-9Zm5 2v2H7v-2h3Zm7 0h-5v2h5v-2Z"/></svg>商品上架</button></div>
    <nav class="nav"><button data-route="index.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 3 9 7-1.2 11H4.2L3 10l9-7Zm0 4.2L7.2 11l.6 6h2.7l.5-4h4l.5 4h.7l.6-6L12 7.2Z"/></svg>我要买</button><button class="active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="m13.5 3-8 14h10.1l-1.2-2H9l4.7-8.2L20 17h-2.1l1.2 2H3L12 3h1.5Z"/></svg>出哈夫币</button><button id="message"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 5h16l-1 12H8l-4 3V5Zm4 4v2h8V9H8Zm0 4v2h6v-2H8Z"/></svg>消息</button><button data-route="my.html"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Zm0 11c5 0 8 2.2 8 5v2H4v-2c0-2.8 3-5 8-5Z"/></svg>我的</button></nav>
    <div class="home-indicator"></div><div class="toast" id="toast"></div>
  </section></main>
  <script>
    const goods=[
      {id:'945992508487',time:'2026-04-28 09:39',state:'fail',label:'审核失败',title:'登录区服：QQ　总资产：22M　纯币资产：22M　账密：账密登录　安全箱：顶级安全箱(3×3)',desc:'三角洲行动-登录方式-QQ｜3天起租',price:'56.42',deposit:'66.00',img:'assets/sell-item-1.jpg'},
      {id:'528302504921',time:'2026-04-14 10:21',state:'wait',label:'待审核',title:'登录区服：微信　总资产：68M　纯币资产：45M　账密：扫码登录　段位：黄金',desc:'三角洲行动-登录方式-微信｜3天起租',price:'98.80',deposit:'80.00',img:'assets/sell-item-2.jpg'},
      {id:'SJZ321510872',time:'2026-03-22 13:32',state:'up',label:'已上架',title:'商品个性标题｜总资产 142M｜纯币 100M｜顶级安全箱｜满级训练中心',desc:'三角洲行动-登录方式-QQ｜12天起租',price:'322.00',deposit:'96.00',img:'assets/sell-item-1.jpg'},
      {id:'SJZ321510895',time:'2026-03-18 09:06',state:'down',label:'已下架',title:'微信区服｜纯币 86M｜高级安全箱｜红狼满级｜稀有刀皮 4 把',desc:'三角洲行动-登录方式-微信｜7天起租',price:'218.00',deposit:'88.00',img:'assets/sell-item-2.jpg'},
      {id:'SJZ321510926',time:'2026-03-12 18:45',state:'delivery',label:'待发货',title:'QQ区服｜总资产 260M｜纯币 180M｜绝密 KD 3.7｜账号等级 58',desc:'三角洲行动-登录方式-QQ｜5天起租',price:'468.00',deposit:'120.00',img:'assets/sell-item-1.jpg'}
    ];
    const labels={all:'全部',wait:'待审核',up:'已上架',down:'已下架',delivery:'待发货'};let state=new URLSearchParams(location.search).get('state')||'all',timer;if(!labels[state])state='all';
    const list=document.getElementById('list'),search=document.getElementById('search'),toast=document.getElementById('toast');
    function fit(){const scale=Math.min(1,innerWidth/375,innerHeight/816),stage=document.getElementById('stage'),phone=stage.querySelector('.phone');stage.style.width=`${375*scale}px`;stage.style.height=`${816*scale}px`;phone.style.transform=`scale(${scale})`}addEventListener('resize',fit);fit();
    function notify(message){toast.textContent=message;toast.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>toast.classList.remove('show'),1600)}
    function render(){const key=search.value.trim().toLowerCase();const data=goods.filter(item=>(state==='all'||item.state===state)&&(!key||(item.id+item.title).toLowerCase().includes(key)));list.innerHTML=data.map(item=>`<article class="card" data-id="${item.id}"><div class="meta"><span>商品编号：${item.id}</span><button class="copy" data-copy="${item.id}">复制</button><span class="time">${item.time}</span><span class="state ${item.state}">${item.label}</span></div><div class="product"><div class="thumb"><img src="${item.img}" alt="商品图片"></div><div class="info"><div class="title">${item.title}</div><div class="desc">${item.desc}</div></div></div><div class="bottom-row"><span>商品价格：<b class="price">¥${item.price}</b></span><i class="divider"></i><span>押金：¥${item.deposit}</span>${item.state==='up'?'<button class="action" data-down="'+item.id+'">下架</button>':''}</div></article>`).join('')||`<div class="empty show"><div class="empty-visual"><i class="empty-card"></i><i class="empty-card"></i></div><span>${key?'未找到相关发布':'暂无'+labels[state]+'内容'}</span></div>`}
    document.getElementById('tabs').addEventListener('click',e=>{const btn=e.target.closest('[data-state]');if(!btn)return;state=btn.dataset.state;document.querySelectorAll('.tab-filter').forEach(x=>x.classList.toggle('active',x===btn));render()});
    list.addEventListener('click',async e=>{const copy=e.target.closest('[data-copy]');if(copy){e.stopPropagation();try{await navigator.clipboard.writeText(copy.dataset.copy)}catch{}notify('商品编号已复制');return}const down=e.target.closest('[data-down]');if(down){const item=goods.find(x=>x.id===down.dataset.down);item.state='down';item.label='已下架';notify('商品已下架');render();return}if(e.target.closest('.card'))notify('商品详情将在后续页面接入')});
    search.addEventListener('input',render);document.querySelectorAll('.tab-filter').forEach(btn=>btn.classList.toggle('active',btn.dataset.state===state));document.getElementById('publish').onclick=()=>location.href='publish.html';document.getElementById('service').onclick=()=>notify('客服在线时间 9:00—24:00');document.getElementById('message').onclick=()=>notify('消息中心将在后续页面接入');document.querySelectorAll('[data-route]').forEach(btn=>btn.onclick=()=>location.href=btn.dataset.route);render();
  </script>
</body>
</html>
